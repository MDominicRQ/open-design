name: open-design

services:
  open-design:
    container_name: open-design
    image: ${OPEN_DESIGN_IMAGE:-ghcr.io/mdominicrq/open-design:latest}
    pull_policy: always
    restart: always
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      OD_BIND_HOST: 0.0.0.0
      OD_API_TOKEN: ${OD_API_TOKEN}
      OD_ALLOWED_ORIGINS: ${OPEN_DESIGN_ALLOWED_ORIGINS:-}
      OD_PORT: 7456
      OD_WEB_PORT: ${OPEN_DESIGN_PORT:-7456}
      OD_APP_VERSION: ${OPEN_DESIGN_VERSION:-}
    expose:
      - "${OPEN_DESIGN_PORT:-7456}"
    volumes:
      - open_design_data:/app/.od
      - open_design_home:/home/open-design
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-1g}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  open_design_data:
  open_design_home:
