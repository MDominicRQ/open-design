name: Build and publish latest multi-arch Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-latest:
    name: Build and push latest multi-arch
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          IMAGE_NAME_LOWER="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE_NAME_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Set image ref
        id: image_ref
        shell: bash
        run: |
          echo "ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          # Publish one tag only. Buildx attaches the per-architecture
          # manifests as children of `latest`; do not create `latest-amd64`,
          # `latest-arm64`, commit-SHA, or run-number tags.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image_ref.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Verify pushed multi-arch manifest
        shell: bash
        run: |
          image_ref='${{ steps.image_ref.outputs.ref }}'
          docker buildx imagetools inspect --raw "$image_ref" > /tmp/open-design-latest-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('/tmp/open-design-latest-manifest.json', 'utf8'));
          const manifests = Array.isArray(manifest.manifests) ? manifest.manifests : [];
          const platforms = new Set(
            manifests.map((entry) => `${entry.platform?.os ?? ''}/${entry.platform?.architecture ?? ''}`),
          );
          for (const expected of ['linux/amd64', 'linux/arm64']) {
            if (!platforms.has(expected)) {
              console.error(`missing platform in latest manifest: ${expected}`);
              console.error(JSON.stringify(manifest, null, 2));
              process.exit(1);
            }
          }
          if (platforms.size < 2) {
            console.error('latest must be a multi-arch manifest, not a single-arch image');
            console.error(JSON.stringify(manifest, null, 2));
            process.exit(1);
          }
          NODE
